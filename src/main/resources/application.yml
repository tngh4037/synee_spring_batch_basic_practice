spring:
  datasource:
    url: jdbc:mysql://localhost:3306/batch_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # Entity 를 보고 테이블을 자동 생성/수정함
    show-sql: true # 실행되는 SQL을 콘솔에 보여줌
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 포맷팅 해줌 (줄바꿈 등)

  batch:
    jdbc:
      initialize-schema: always # 배치가 실행될 때 필요한 메타 테이블들을 자동 생성해준다.
    job:
      enabled: true # 젠킨스로 해당 job을 실행하기 위해 enabled의 값을 true로 변경해준다.